<include href="views/header.html"></include>

<body>
<div class="container">
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a class="apply" href="info">Apply Now!</a>
    </div>
    <div class="head">
        <h4>Green River Corn Dogs</h4>
        <p>Auburn Washington, Unpaid, 17.5 weeks</p>
    </div>
    <form class="body">
        <div class="p-3 m-3">
            <h1 class="spacer">Experience</h1>
            <div class="row">
                <div class="col-12 col-md-8">
                    <div class="form-group h-100">
                        <label class="form-label" for="bio">Biography</label>
                        <textarea class="form-control h-75" id="bio" placeholder="Write about yourself"></textarea>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="form-group">
                        <label class="form-label" for="github">Github Link</label>
                        <input type="textarea" class="form-control" id="github" placeholder="github.com/my_github" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Years Experience</label><br>
                        <input type="radio" id="0-2" name="years" value="0-2" required>
                        <label class="form-label" for="0-2"> 0-2</label><br>
                        <input type="radio" id="2-4" name="years" value="2-4" required>
                        <label class="form-label" for="2-4"> 2-4</label><br>
                        <input type="radio" id="4+" name="years" value="4+" required>
                        <label class="form-label" for="4+"> 4+</label><br>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Willing To Relocate</label><br>
                        <input type="radio" id="yes" name="relocate" value="yes">
                        <label class="form-label" for="yes"> Yes</label><br>
                        <input type="radio" id="maybe" name="relocate" value="maybe">
                        <label class="form-label" for="maybe"> Maybe</label><br>
                        <input type="radio" id="no" name="relocate" value="no">
                        <label class="form-label" for="no"> No</label><br>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Next ></button>
                </div>
            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
