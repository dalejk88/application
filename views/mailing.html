<include href="views/header.html"></include>

<body>
<div class="container">
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a class="apply" href="info">Apply Now!</a>
    </div>
    <div class="head">
        <h4>Green River Corn Dogs</h4>
        <p>Auburn Washington, Unpaid, 17.5 weeks</p>
    </div>
    <form class="body" action="#" method="post">
        <div class="p-3 m-3">
            <h1 class="spacer">Job Openings Mailing Lists</h1>
            <div class="row">
                <label class="form-label">Software Development Jobs</label><br>
                <repeat group="{{ @jobs }}" value="{{ @job }}">
                    <div class="col-md-3 col-sm-6 col-12">
                        <label><input type="checkbox" name="jobs[]" value="{{ @job }}"> {{ ucfirst(@job) }}</label><br>
                    </div>
                </repeat>
            </div>
            <div class="row">
                <label class="form-label">Industry Verticals</label><br>
                <repeat group="{{ @verticals }}" value="{{ @vertical }}">
                    <div class="col-md-3 col-sm-6 col-12">
                        <label><input type="checkbox" name="verticals[]" value="{{ @vertical }}"> {{ ucfirst(@vertical) }}</label><br>
                    </div>
                </repeat>
            </div>
            <button type="submit" class="btn btn-primary w-100">Next ></button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
